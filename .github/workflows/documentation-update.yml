name: Documentation Update

on:
  push:
    branches:
      - main
      - v3
      - master
    paths:
      - 'docs/**'
      - '.github/generate_readme.py'
      - '!README.md'  # Ignore README changes to prevent loops
  pull_request:
    branches:
      - main
      - v3
      - master
    paths:
      - 'docs/**'
      - '.github/generate_readme.py'
      - '!README.md'  # Ignore README changes to prevent loops
  workflow_dispatch: # Manual trigger

jobs:
  update-documentation:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allow pushing changes
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0  # Fetch full history for better git operations
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies (if needed)
      run: |
        python -m pip install --upgrade pip
        # Add any additional dependencies here if needed
        
    - name: Generate README
      id: generate
      run: |
        echo "🔍 Starting README generation..."
        python3 .github/generate_readme.py
        
        # Capture script output for summary
        if [ -f README.md ]; then
          file_size=$(wc -c < README.md)
          line_count=$(wc -l < README.md)
          echo "file_size=$file_size" >> $GITHUB_OUTPUT
          echo "line_count=$line_count" >> $GITHUB_OUTPUT
          echo "✅ README generation completed successfully"
        else
          echo "❌ README generation failed"
          exit 1
        fi
        
    - name: Validate README content
      run: |
        echo "🔍 Validating README content..."
        
        # Check if README has minimum expected content
        if [ $(wc -l < README.md) -lt 50 ]; then
          echo "❌ README seems too short (less than 50 lines)"
          exit 1
        fi
        
        # Check for required sections
        required_sections=("# umami API docs" "## Websites" "## Links" "## Pixels" "## Settings")
        for section in "${required_sections[@]}"; do
          if ! grep -q "$section" README.md; then
            echo "❌ Missing required section: $section"
            exit 1
          fi
        done
        
        echo "✅ README validation passed"

    - name: Commit and push README
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # Add README to git (force add despite .gitignore)
        git add -f README.md
        
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "ℹ️ No changes to README detected, skipping commit"
        else
          # Create detailed commit message
          git commit -m "📚 Auto-update README documentation
          
          🔄 Generated from current docs structure
          📊 File size: ${{ steps.generate.outputs.file_size }} bytes
          📝 Line count: ${{ steps.generate.outputs.line_count }} lines
          🕒 Generated at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          🔗 Commit: ${{ github.sha }}
          🌿 Branch: ${{ github.ref_name }}
          
          This README was automatically generated by the documentation workflow."
          
          git push
          echo "✅ README changes committed and pushed successfully"
        fi
        
    - name: Create workflow summary
      run: |
        echo "# 📚 Documentation Update Complete!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## ✅ README Generation Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| File Size | ${{ steps.generate.outputs.file_size }} bytes |" >> $GITHUB_STEP_SUMMARY
        echo "| Line Count | ${{ steps.generate.outputs.line_count }} lines |" >> $GITHUB_STEP_SUMMARY
        echo "| Generated At | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
        echo "| Commit SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📊 Documentation Progress" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "The README has been automatically generated based on the current documentation structure." >> $GITHUB_STEP_SUMMARY
        echo "You can download the generated README from the artifacts section of this workflow run." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 🔗 Next Steps" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Review the generated README" >> $GITHUB_STEP_SUMMARY
        echo "- Complete missing documentation (❌ entries)" >> $GITHUB_STEP_SUMMARY
        echo "- Keep documentation up to date" >> $GITHUB_STEP_SUMMARY
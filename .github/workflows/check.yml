name: Weekly Python Script

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Python script
        run: python _scripts/checks/endpoints.py

      - name: Check for changes
        id: check_diff
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"
          git diff --quiet || echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Commit changes
        if: steps.check_diff.outputs.has_changes == 'true'
        run: |
          git checkout -b _scripts/checks/update-$(date -u +'%Y-%m-%d')
          git add -A
          git commit -m "API Check update: $(date -u +'%Y-%m-%d')"

      - name: Push changes
        if: steps.check_diff.outputs.has_changes == 'true'
        run: |
          git push origin HEAD

      - name: Create Pull Request
        if: steps.check_diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "API Check"
          title: "API Check update ($(date -u +'%Y-%m-%d'))"
          body: |
            This automated PR includes changes generated by the weekly script.
          branch: weekly/update-$(date -u +'%Y-%m-%d')
          base: main

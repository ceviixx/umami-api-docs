name: API Check

on:
  schedule:
    - cron: '0 8 * * 1' 
  workflow_dispatch:

jobs:
  api-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install required Python packages
        run: pip install requests

      - name: Run API check script
        run: python _scripts/checks/endpoints.py

      - name: Generate API documentation
        run: python _scripts/checks/create-docs.py

      - name: Check for changes
        id: check_diff
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"
          git diff --quiet || echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push changes to api-check branch
        if: steps.check_diff.outputs.has_changes == 'true'
        run: |
          git checkout -B api-check
          git add -A
          git commit -m "API check: $(date -u +'%Y-%m-%d')"
          git push origin api-check --force
